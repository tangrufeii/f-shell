name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    name: Build Windows Release
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Verify updater signing secret
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing repository secret TAURI_SIGNING_PRIVATE_KEY. Put the full private key content into GitHub Secrets before publishing."
          }

      - name: Install frontend dependencies
        run: npm ci

      - name: Read app version
        id: app_version
        shell: pwsh
        run: |
          $version = (Get-Content "package.json" | ConvertFrom-Json).version
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate pushed tag matches app version
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          $expectedTag = "v${{ steps.app_version.outputs.version }}"
          $actualTag = "${{ github.ref_name }}"
          if ($actualTag -ne $expectedTag) {
            throw "Tag $actualTag does not match package version $expectedTag. Bump the app version first, then push the matching tag."
          }

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@action-v0.6.2
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.app_version.outputs.version) }}
          releaseName: ${{ github.ref_type == 'tag' && format('FShell {0}', github.ref_name) || format('FShell v{0}', steps.app_version.outputs.version) }}
          releaseBody: |
            Automated Windows release for FShell.

            Included assets:
            - NSIS installer
            - MSI installer
            - updater signatures
            - latest.json for Tauri updater
          releaseDraft: false
          prerelease: false
          args: --bundles nsis msi
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          uploadUpdaterSignatures: true
